name: Call update changelog

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Target version; leave empty to auto bump"
        required: false
        type: string
      base_branch:
        description: "Base branch to read and target"
        required: false
        default: master
        type: string
      distribution:
        description: "Changelog distribution"
        required: false
        default: unstable
        type: string
      create_pr:
        description: "Create a pull request after generating changelog"
        required: false
        default: false
        type: boolean

jobs:
  update_changelog:
    uses: mhduiy/dde-shell/.github/workflows/update-changelog.yml@master
    with:
      version: ${{ inputs.version }}
      base_branch: ${{ inputs.base_branch }}
      distribution: ${{ inputs.distribution }}
      create_pr: ${{ inputs.create_pr }}
    secrets: inherit

